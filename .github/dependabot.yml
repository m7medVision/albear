# Conventional Commits prefixes are required: the commit-msg hook and the
# pr-title CI job both reject anything else.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    commit-message:
      prefix: build

  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    commit-message:
      prefix: build

  - package-ecosystem: npm
    directory: /desktop
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    commit-message:
      prefix: build

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    commit-message:
      prefix: ci
