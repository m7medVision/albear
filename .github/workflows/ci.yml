name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs on every event and decides which of the heavy jobs below are worth
  # running, so a desktop-only change doesn't rebuild the extension, a Go dep
  # bump doesn't build the desktop installer, etc. The filters must stay
  # honest: any path that can affect a job's outcome must be listed here, or
  # that job will skip and let a real failure slip through.
  detect:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      extension: ${{ steps.filter.outputs.extension }}
      desktop: ${{ steps.filter.outputs.desktop }}
      generated: ${{ steps.filter.outputs.generated }}
    steps:
      - uses: actions/checkout@v7
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # go covers the whole Go tree; generated is the narrow set that can
          # make sqlc output or the Noise vectors drift (see its own job).
          filters: |
            go:
              - 'cmd/**'
              - 'internal/**'
              - 'tools/noisevectors/**'
              - 'go.mod'
              - 'go.sum'
              - 'sqlc.yaml'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            extension:
              - 'extension/**'
              - '.github/workflows/ci.yml'
            desktop:
              - 'desktop/**'
              - '.github/workflows/ci.yml'
            generated:
              - 'sqlc.yaml'
              - 'internal/infrastructure/sqlite/sql/**'
              - 'internal/infrastructure/sqlite/gen/**'
              - 'internal/infrastructure/transport/noise/**'
              - 'tools/noisevectors/**'
              - 'extension/src/noise/testdata/vectors.json'
              - 'desktop/src/main/testdata/vectors.json'
              - 'Makefile'
              - '.github/workflows/ci.yml'

  go:
    name: Go (fmt, vet, test)
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -timeout 300s

  extension:
    name: Extension (build, test)
    needs: detect
    if: needs.detect.outputs.extension == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (includes tsc)
        run: pnpm build

      - name: Test
        run: pnpm test

  desktop:
    name: Desktop (typecheck, build, test)
    needs: detect
    if: needs.detect.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm exec tsc -- --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  generated:
    name: Generated code is up to date
    needs: detect
    if: needs.detect.outputs.generated == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # Pinned: another sqlc release regenerates different code and fails this
      # check for reasons unrelated to the change under test.
      - uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: "1.31.1"

      - name: sqlc output matches sql/
        run: |
          sqlc generate
          git diff --exit-code -- internal/infrastructure/sqlite/gen

      # Go owns the Noise wire format; both TS copies must be byte-identical.
      # A diff here means a checked-in copy is stale or the two have drifted.
      - name: Noise vectors match the Go implementation
        run: |
          make vectors
          git diff --exit-code -- \
            extension/src/noise/testdata/vectors.json \
            desktop/src/main/testdata/vectors.json

  pr-title:
    name: PR title (conventional commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9._/ -]+\))?!?: .+'
          if printf '%s\n' "$TITLE" | grep -qE "$pattern"; then
            echo "PR title OK: $TITLE"
          else
            echo "PR title does not follow the conventional commit format: $TITLE" >&2
            echo "Expected: type(optional scope): description" >&2
            echo "Types: feat fix docs style refactor perf test build ci chore revert" >&2
            echo "Example: feat(vaultd): add auto-lock timeout" >&2
            exit 1
          fi

  # The ONLY status check to mark required in branch protection. It is green
  # when every job above either passed or was intentionally skipped by the
  # path filter — so a skipped job never blocks a merge, and a failed (or
  # cancelled) job always does. Without this, requiring e.g. "desktop"
  # directly would block merges on PRs where desktop was correctly skipped
  # (a skipped job reports "skipped", not "success"). Failing closed on a
  # detect failure too: if detection broke, nothing was really validated.
  ci-ok:
    name: CI (required)
    needs: [detect, go, extension, desktop, generated, pr-title]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          echo "detect=${{needs.detect.result}} go=${{needs.go.result}} extension=${{needs.extension.result}} desktop=${{needs.desktop.result}} generated=${{needs.generated.result}} pr-title=${{needs.pr-title.result}}"
          for r in \
            "${{needs.detect.result}}" \
            "${{needs.go.result}}" \
            "${{needs.extension.result}}" \
            "${{needs.desktop.result}}" \
            "${{needs.generated.result}}" \
            "${{needs.pr-title.result}}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "CI gate failing on result: $r" >&2
              exit 1
            fi
          done
