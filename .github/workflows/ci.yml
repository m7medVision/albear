name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (fmt, vet, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -timeout 300s

  extension:
    name: Extension (build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (includes tsc)
        run: pnpm build

      - name: Test
        run: pnpm test

  desktop:
    name: Desktop (typecheck, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm exec tsc -- --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  generated:
    name: Generated code is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # Pinned: a different sqlc release regenerates different code, which
      # would fail this check for reasons unrelated to the change under test.
      - uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: "1.31.1"

      - name: sqlc output matches sql/
        run: |
          sqlc generate
          git diff --exit-code -- internal/infrastructure/sqlite/gen

      # Go owns the Noise wire format, and the extension and desktop TS
      # implementations must test against byte-identical vectors. `make
      # vectors` regenerates from Go and copies to both, so any diff here means
      # a checked-in copy is stale or the two had drifted apart.
      - name: Noise vectors match the Go implementation
        run: |
          make vectors
          git diff --exit-code -- \
            extension/src/noise/testdata/vectors.json \
            desktop/src/main/testdata/vectors.json

  pr-title:
    name: PR title (conventional commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9._/ -]+\))?!?: .+'
          if printf '%s\n' "$TITLE" | grep -qE "$pattern"; then
            echo "PR title OK: $TITLE"
          else
            echo "PR title does not follow the conventional commit format: $TITLE" >&2
            echo "Expected: type(optional scope): description" >&2
            echo "Types: feat fix docs style refactor perf test build ci chore revert" >&2
            echo "Example: feat(vaultd): add auto-lock timeout" >&2
            exit 1
          fi
