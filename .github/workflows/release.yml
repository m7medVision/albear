# main -> vX.Y.Z-rc.N (prerelease) | stable -> vX.Y.Z (latest)
# Promote with: git push origin main:stable   (keep it a fast-forward)
name: Release

on:
  push:
    branches: [main, stable]
    tags: ["v*"] # escape hatch: a hand-pushed tag still releases

permissions:
  contents: write

# Never cancel: a half-published release is worse than a slow queue.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      release: ${{ steps.resolve.outputs.release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # svu reads the whole history

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install svu
        run: go install github.com/caarlos0/svu/v3@v3.4.1

      - name: Resolve tag
        id: resolve
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$REF_TYPE" = "tag" ]; then
            echo "tag=$REF_NAME" >>"$GITHUB_OUTPUT"
            echo "release=true" >>"$GITHUB_OUTPUT"
            echo "Hand-pushed tag $REF_NAME; releasing it as-is."
            exit 0
          fi

          last=$(git describe --tags --abbrev=0 2>/dev/null || true)
          range=${last:+$last..HEAD}

          # Mirror svu: only feat:, fix: and any type!: release anything.
          # Here-string, not a pipe: `git log | grep -q` dies on SIGPIPE (141)
          # when grep matches early, and pipefail turns that win into a skip.
          subjects=$(git log --format='%s' $range)
          if [ "$REF_NAME" != "stable" ] &&
             ! grep -qE '^(feat|fix)(\([^)]*\))?!?:|^[a-zA-Z]+(\([^)]*\))?!:' \
                 <<<"$subjects"; then
            echo "release=false" >>"$GITHUB_OUTPUT"
            echo "No feat/fix/breaking commits since ${last:-the start}; skipping."
            exit 0
          fi

          # Hide rc tags from svu so base comes off the last STABLE tag —
          # otherwise every merge re-bumps off the previous rc and rc.2 never
          # exists. Local to the runner's clone; only the new tag is pushed.
          rc_tags=$(git tag -l '*-rc.*')
          [ -z "$rc_tags" ] || git tag -d $rc_tags >/dev/null
          base=$(svu next --v0 --tag.mode=current)

          if [ "$REF_NAME" = "stable" ]; then
            tag="$base"
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "release=false" >>"$GITHUB_OUTPUT"
              echo "$tag is already tagged; nothing to promote."
              exit 0
            fi
          else
            # Highest existing rc +1 (counting would misnumber after a delete).
            # `|| true`: the first rc of a base greps nothing and pipefail aborts.
            n=$(printf '%s\n' "$rc_tags" | grep "^${base}-rc\." |
                sed "s|^${base}-rc\.||" | sort -n | tail -1 || true)
            tag="${base}-rc.$(( ${n:-0} + 1 ))"
          fi

          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "release=true" >>"$GITHUB_OUTPUT"
          echo "Tagging $tag"

          # Tag from inside this workflow, not a separate one: tags pushed with
          # GITHUB_TOKEN do not trigger workflow runs, and the alternative is a
          # long-lived write-scoped PAT this repo should not carry.
          git tag "$tag"
          git push origin "$tag"

  goreleaser:
    name: Go binaries, packages, draft release
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # provenance attestation
      attestations: write
    steps:
      # ref: the tag, not the branch — main may move while this runs.
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0 # goreleaser needs full history for the changelog

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # Creates the DRAFT release; the jobs below attach to it.
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm

  extension:
    name: Extension zip
    needs: [version, goreleaser]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: extension
        run: pnpm install --frozen-lockfile

      # Chrome requires plain dotted integers, so the -rc.N/+build suffix is
      # stripped for the manifest only; the zip filename keeps the full tag.
      - name: Sync manifest version from tag
        working-directory: extension
        run: |
          ver="${TAG#v}"
          ver="${ver%%-*}"
          ver="${ver%%+*}"
          sed -i "s/^  version: '[0-9][^']*',$/  version: '${ver}',/" manifest.config.ts
          grep -qF "version: '${ver}'," manifest.config.ts

      - name: Build
        working-directory: extension
        run: pnpm build

      - name: Zip
        run: |
          (cd extension/dist && zip -qr "../../albear-extension-${TAG}.zip" .)

      - name: Upload to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" --clobber \
            "albear-extension-${TAG}.zip"

  desktop:
    name: Desktop installer (linux)
    needs: [version, goreleaser]
    # Linux only: the app dials a vaultd socket that has no macOS/Windows build.
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: desktop
    env:
      TAG: ${{ needs.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Sync app version from tag
        run: |
          (cd release/app && npm version "${TAG#v}" \
            --no-git-tag-version --allow-same-version)

      - name: Install dependencies
        run: npm ci

      # electron-builder's RPM target invokes rpmbuild, and the same package
      # supplies rpm(8) for inspecting the result before publication.
      - name: Install Linux package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      # NOT `npm run package`: that script hardcodes `--publish never` and npm
      # appends extra args to the wrong command in the chain. Desktop remains
      # amd64-only until an arm64 Electron build is validated; the core package
      # continues to ship both architectures independently.
      - name: Package and upload desktop artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm exec ts-node -- ./.erb/scripts/clean.js dist
          npm run build
          npx electron-builder build --linux --x64 --publish always

      - name: Validate desktop package metadata and contents
        run: ./scripts/validate-linux-packages.sh release/build "$TAG"

      # GitHub Releases is not an apt/dnf repository. Download the matching
      # core assets from the draft and prove both local files install together.
      - name: Download matching core packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release/core
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" \
            --pattern 'albear_*.deb' --pattern 'albear_*.rpm' \
            --dir release/core

      - name: Smoke-test Ubuntu and Fedora installation
        run: ./scripts/smoke-linux-packages.sh release/build release/core "$TAG"

  publish:
    name: Publish release
    needs: [version, extension, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Un-draft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          # --latest for stable only: /releases/latest drives the CLI update
          # notice and install.sh, and must never answer with a prerelease.
          if [[ "$TAG" == *-* ]]; then
            gh release edit "$TAG" -R "$GITHUB_REPOSITORY" --draft=false
          else
            gh release edit "$TAG" -R "$GITHUB_REPOSITORY" --draft=false --latest
          fi
